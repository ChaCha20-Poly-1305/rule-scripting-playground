name: Nightly Update
on:
  schedule:
    - cron: '0 16 * * *'  # 16:00 UTC
jobs:
  run-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run scripts
        run: |
          python extract-domains.py
          bash merge-and-sort.sh
          bash generate-domain-rules.sh
          bash generate-ip-geo-detect-rules.sh
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Automated update: $(date +'%Y-%m-%d')"
          git push
